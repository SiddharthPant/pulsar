{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block body %}
    <form id="loginForm">
        <label>
            Email:
            <input type="email" name="email" required />
        </label>
        <label>
            Password:
            <input type="password" name="password" required />
        </label>
        <button data-on:click="@post('/login/handle', {contentType: 'form', selector: '#loginForm'})">Submit</button>
    </form>
{% endblock %}
